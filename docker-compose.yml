version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: trade-journal-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: trade-journal-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/trade-journal
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost
      - NODE_ENV=production
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: trade-journal-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo_data:
